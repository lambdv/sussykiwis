## Nginx sits in front of the Rust server.
## - Serves the built Vite client at `/`.
## - Proxies `/api/*` to the Rust server (including websockets).

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Websocket upgrade helper.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Built client assets.
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the Rust server.
    # Trailing slash on proxy_pass strips the `/api/` prefix.
    location /api/ {
      proxy_pass http://127.0.0.1:3000/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # Convenience redirect for `/api` (no trailing slash).
    location = /api {
      return 301 /api/;
    }

    # Cache immutable build artifacts aggressively.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # SPA fallback for client-side routing.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
