services:
  app:
    build:
      context: ..
      dockerfile: container/Dockerfile
    container_name: kiwi-app
    environment:
      # Bind the Rust server to all interfaces so the host can reach port 3000.
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "8080:80"
      - "3000:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kiwi-cloudflared
    depends_on:
      - app
    # Use a temporary public URL for quick ECS/mobile testing.
    command: tunnel --protocol http2 --url http://app:80
